# Railway configuration for the Eventify scraper cron service.
# Docs: https://docs.railway.com/reference/config-as-code
#
# This file is used by the "scraper-cron" service ONLY.
# In the Railway dashboard → scraper-cron service → Settings →
# set "Config File Path" to: railway.cron.toml
#
# Schedule: daily at 09:00 UTC = 06:00 Santiago time (Chile Standard Time, UTC-3).
# During Chilean Summer Time (UTC-4, roughly Nov–Mar) this runs at 05:00 local —
# adjust cronSchedule to "0 10 * * *" during that period if needed.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildTarget = "prod"

[deploy]
startCommand = "python scrapers/run_all.py"
cronSchedule = "0 9 * * *"
# Cron jobs do not need health checks or restart policies.
# Railway marks the run as failed if the process exits with code != 0.
# run_all.py exits 1 only when ALL scrapers crash; partial failures exit 0.
restartPolicyType = "NEVER"
