# Railway deployment configuration for the Eventify API service.
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildTarget = "prod"

[deploy]
# Runs Alembic migrations then starts uvicorn.
# Railway injects $PORT automatically — start.sh reads it.
startCommand = "./start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ─────────────────────────────────────────────────────────────────────────────
# CRON JOB — Daily scraper run at 06:00 Santiago time (09:00 UTC, UTC-3)
# ─────────────────────────────────────────────────────────────────────────────
# Railway cron jobs must be configured as a SEPARATE service in the dashboard.
# When creating the second service, set these values in its settings:
#
#   Start command : python scrapers/run_all.py
#   Cron schedule : 0 9 * * *
#
# Or via this toml block if Railway adds multi-service support for your plan:
#
# [[services]]
# name = "scraper-cron"
# startCommand = "python scrapers/run_all.py"
# cronSchedule = "0 9 * * *"   # 09:00 UTC = 06:00 Santiago (UTC-3)
