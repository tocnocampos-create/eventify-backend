# Railway deployment configuration for the Eventify API service.
# Docs: https://docs.railway.com/reference/config-as-code
#
# TWO SERVICES share this repo:
#   1. eventify-api   — reads this file (railway.toml)
#   2. scraper-cron   — reads railway.cron.toml
#      In the Railway dashboard → scraper-cron service → Settings →
#      "Config File Path": railway.cron.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildTarget = "prod"

[deploy]
# Runs Alembic migrations then starts uvicorn.
# Railway injects $PORT automatically — start.sh reads it.
startCommand = "./start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
